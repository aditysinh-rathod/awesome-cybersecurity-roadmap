site_name: Awesome Cybersecurity Roadmap
site_description: Learn Cybersecurity from Beginner to Advanced
site_author: Aditysinh Rathod
site_url: https://aditysinh-rathod.github.io/awesome-cybersecurity-roadmap/

repo_name: aditysinh-rathod/awesome-cybersecurity-roadmap
repo_url: https://github.com/aditysinh-rathod/awesome-cybersecurity-roadmap

theme:
  name: material
  language: en

  custom_dir: docs

  logo: assets/logo.png
  favicon: assets/favicon.png

  icon:
    repo: fontawesome/brands/github

  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.tracking
    - toc.integrate
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes

  - toc:
      permalink: true

  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aditysinh-rathod

    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/aditysinh-rathod/

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

copyright: Copyright © 2026 Aditysinh Rathod

nav:
  - Home: index.md
