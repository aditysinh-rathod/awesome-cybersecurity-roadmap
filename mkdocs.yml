site_name: Awesome Cybersecurity Roadmap
site_description: Learn Cybersecurity from Beginner to Advanced
site_author: Aditysinh Rathod
site_url: https://aditysinh-rathod.github.io/awesome-cybersecurity-roadmap/

repo_name: aditysinh-rathod/awesome-cybersecurity-roadmap
repo_url: https://github.com/aditysinh-rathod/awesome-cybersecurity-roadmap

theme:
  name: material
  language: en

  icon:
    logo: material/shield-lock
    repo: fontawesome/brands/github

  favicon: https://raw.githubusercontent.com/squidfunk/mkdocs-material/master/material/.icons/material/shield-lock.svg

  palette:

    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.footer
    - navigation.indexes
    - navigation.tracking

    - search.highlight
    - search.suggest
    - search.share

    - toc.integrate

    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes

  - toc:
      permalink: true

  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aditysinh-rathod

    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/aditysinh-rathod/

copyright: Copyright © 2026 Aditysinh Rathod
