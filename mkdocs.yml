site_name: Awesome Cybersecurity Roadmap
site_description: Learn Cybersecurity from Beginner to Advanced with Roadmaps, Labs and Projects
site_author: Aditysinh Rathod
site_url: https://aditysinh-rathod.github.io/awesome-cybersecurity-roadmap/

repo_name: aditysinh-rathod/awesome-cybersecurity-roadmap
repo_url: https://github.com/aditysinh-rathod/awesome-cybersecurity-roadmap
edit_uri: edit/main/docs/

theme:
  name: material
  language: en

  logo: assets/logo.png
  favicon: assets/favicon.png

  font:
    text: Inter
    code: JetBrains Mono

  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  icon:
    repo: fontawesome/brands/github

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.path

    - toc.follow
    - toc.integrate

    - search.highlight
    - search.share
    - search.suggest

    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - abbr

  - toc:
      permalink: true

  - pymdownx.details
  - pymdownx.superfences

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span

  - pymdownx.inlinehilite

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  generator: false

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aditysinh-rathod

nav:
  - 🏠 Home: index.md

  - 🚀 Getting Started:
      - Introduction: getting-started.md

  - 📚 Learning Roadmap:

      - Overview: roadmap.md

      - Linux:
          - Overview: linux/index.md
          - Linux Basics: linux/linux-basics.md
          - File System: linux/file-system.md
          - Permissions: linux/permissions.md
          - Bash: linux/bash.md
          - SSH: linux/ssh.md

      - Networking:
          - Overview: networking/index.md
          - OSI Model: networking/osi.md
          - TCP/IP: networking/tcp-ip.md
          - DNS: networking/dns.md
          - HTTP: networking/http.md
          - Wireshark: networking/wireshark.md

      - Python:
          - Overview: python/index.md
          - Python Basics: python/basics.md
          - Requests: python/requests.md
          - Socket Programming: python/socket-programming.md
          - Scapy: python/scapy.md
          - Cryptography: python/cryptography.md

      - Web Security:
          - Overview: web-security/index.md
          - OWASP Top 10: web-security/owasp-top-10.md
          - XSS: web-security/xss.md
          - SQL Injection: web-security/sql-injection.md
          - Authentication: web-security/authentication.md

  - 🛠 Mini Projects: projects.md

  - 🧪 Hands-on Labs: labs.md

  - 📖 Resources: resources.md

  - ❤️ About: about.md

copyright: |
  Copyright © 2026 Aditysinh Rathod • Awesome Cybersecurity Roadmap
