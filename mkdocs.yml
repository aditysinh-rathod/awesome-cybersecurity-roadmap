site_name: Awesome Cybersecurity Roadmap
site_description: Learn Cybersecurity from Beginner to Advanced
site_author: Aditysinh Rathod
site_url: https://aditysinh-rathod.github.io/awesome-cybersecurity-roadmap/

repo_name: aditysinh-rathod/awesome-cybersecurity-roadmap
repo_url: https://github.com/aditysinh-rathod/awesome-cybersecurity-roadmap
edit_uri: edit/main/docs/

theme:
  name: material
  language: en

  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.tracking

    - toc.follow
    - toc.integrate

    - search.highlight
    - search.share
    - search.suggest

    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - abbr

  - toc:
      permalink: true

  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aditysinh-rathod

  generator: false

copyright: Copyright © 2026 Aditysinh Rathod

nav:
  - Home: index.md
